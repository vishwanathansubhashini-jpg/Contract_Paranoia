<svg xmlns="http://www.w3.org/2000/svg" width="1360" viewBox="0 0 680 560" style="font-family:system-ui,sans-serif;background:#ffffff">
<style>
  text{font-family:system-ui,sans-serif}
  .th{font-size:14px;font-weight:600}
  .ts{font-size:12px}
</style>
<defs>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- User -->
<rect x="260" y="30" width="160" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="340" y="52" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">User</text>
<line x1="300" y1="74" x2="188" y2="130" stroke="#888780" stroke-width="0.8" marker-end="url(#a)"/>
<text class="ts" x="218" y="108" text-anchor="middle" fill="#888780">voice</text>
<line x1="340" y1="74" x2="340" y2="130" stroke="#888780" stroke-width="0.8" marker-end="url(#a)"/>
<text class="ts" x="360" y="108" fill="#888780">camera</text>
<line x1="380" y1="74" x2="490" y2="130" stroke="#888780" stroke-width="0.8" marker-end="url(#a)"/>
<text class="ts" x="460" y="108" fill="#888780">contract</text>

<!-- Browser -->
<rect x="80" y="130" width="500" height="64" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="330" y="154" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Browser</text>
<text class="ts" x="330" y="174" text-anchor="middle" dominant-baseline="central" fill="#185FA5">Captures mic audio · streams camera frames · renders chat + clause cards</text>

<!-- Browser ↔ Gateway -->
<line x1="330" y1="194" x2="330" y2="234" stroke="#378ADD" stroke-width="1.2" marker-end="url(#a)"/>
<line x1="350" y1="234" x2="350" y2="194" stroke="#378ADD" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#a)"/>
<text class="ts" x="376" y="218" dominant-baseline="central" fill="#378ADD">WebSocket</text>

<!-- Gateway -->
<rect x="170" y="234" width="320" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="330" y="256" text-anchor="middle" dominant-baseline="central" fill="#3C3489">WebSocket gateway</text>

<!-- Gateway → Para -->
<line x1="330" y1="278" x2="330" y2="314" stroke="#7F77DD" stroke-width="1.2" marker-end="url(#a)"/>

<!-- ADK frame -->
<rect x="60" y="314" width="420" height="130" rx="10" fill="none" stroke="#7F77DD" stroke-width="0.5" stroke-dasharray="6 4"/>
<text class="ts" x="270" y="330" text-anchor="middle" fill="#7F77DD">Google ADK</text>

<!-- Para -->
<rect x="76" y="338" width="172" height="90" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="162" y="364" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Para</text>
<text class="ts" x="162" y="382" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Root agent</text>
<text class="ts" x="162" y="400" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Manages session</text>
<text class="ts" x="162" y="416" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Flags clauses</text>

<!-- Para → Analyzer -->
<line x1="248" y1="383" x2="284" y2="383" stroke="#7F77DD" stroke-width="1.2" marker-end="url(#a)"/>

<!-- Analyzer -->
<rect x="284" y="338" width="180" height="90" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="374" y="364" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Analyzer</text>
<text class="ts" x="374" y="382" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Sub-agent</text>
<text class="ts" x="374" y="400" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Validates clauses</text>
<text class="ts" x="374" y="416" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Legal grounding</text>

<!-- Judge agent -->
<rect x="510" y="338" width="148" height="90" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="584" y="364" text-anchor="middle" dominant-baseline="central" fill="#085041">Judge agent</text>
<text class="ts" x="584" y="382" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Quality auditor</text>
<text class="ts" x="584" y="400" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Only agent using</text>
<text class="ts" x="584" y="416" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Vertex AI</text>

<!-- Gateway → Judge (audit path, dashed) -->
<path d="M490 256 L584 256 L584 338" fill="none" stroke="#1D9E75" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#a)"/>
<text class="ts" x="540" y="248" dominant-baseline="central" fill="#0F6E56">audit request</text>

<!-- ADK/Para → Gemini Live -->
<line x1="270" y1="444" x2="270" y2="490" stroke="#BA7517" stroke-width="1.2" marker-end="url(#a)"/>

<!-- Analyzer → Google Search -->
<line x1="374" y1="428" x2="460" y2="490" stroke="#BA7517" stroke-width="1.2" marker-end="url(#a)"/>

<!-- Judge → Vertex AI -->
<line x1="584" y1="428" x2="590" y2="490" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#a)"/>

<!-- Gemini Live -->
<rect x="80" y="490" width="200" height="52" rx="8" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="180" y="512" text-anchor="middle" dominant-baseline="central" fill="#633806">Gemini Live</text>
<text class="ts" x="180" y="530" text-anchor="middle" dominant-baseline="central" fill="#854F0B">Voice + vision · real-time</text>

<!-- Google Search -->
<rect x="310" y="490" width="190" height="52" rx="8" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="405" y="512" text-anchor="middle" dominant-baseline="central" fill="#633806">Google Search</text>
<text class="ts" x="405" y="530" text-anchor="middle" dominant-baseline="central" fill="#854F0B">Legal grounding · citations</text>

<!-- Vertex AI — Judge only -->
<rect x="520" y="490" width="140" height="52" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="590" y="512" text-anchor="middle" dominant-baseline="central" fill="#085041">Vertex AI</text>
<text class="ts" x="590" y="530" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Judge agent only</text>

<!-- Legend -->
<line x1="80" y1="558" x2="112" y2="558" stroke="#888780" stroke-width="1.2" marker-end="url(#a)"/>
<text class="ts" x="118" y="562" dominant-baseline="central" fill="#888780">data flow</text>
<line x1="210" y1="558" x2="242" y2="558" stroke="#888780" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#a)"/>
<text class="ts" x="248" y="562" dominant-baseline="central" fill="#888780">async / audit path</text>
</svg>
